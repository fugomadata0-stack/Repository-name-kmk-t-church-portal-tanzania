<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | KMK(T) Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="phase2.css" />
  </head>
  <body class="auth-body">
    <main class="state-wrap">
      <section class="state-card">
        <span class="badge">Reset Password</span>
        <h2>Weka Nenosiri Jipya</h2>
        <p class="security" id="resetStatusAlert">Reset token validation + secure password update.</p>
        <form class="form-grid" id="resetForm">
          <div class="password-wrap">
            <input type="password" id="resetPassword" name="password" placeholder="Nenosiri jipya / New password" required />
            <button type="button" class="btn secondary tiny" data-toggle-password="resetPassword">Show</button>
          </div>
          <div class="password-wrap">
            <input type="password" id="resetConfirmPassword" name="confirm_password" placeholder="Rudia nenosiri / Confirm password" required />
            <button type="button" class="btn secondary tiny" data-toggle-password="resetConfirmPassword">Show</button>
          </div>
          <p class="security" id="resetStrengthText">Password strength: -</p>
          <button class="btn" type="submit">Save New Password</button>
          <a href="auth-login.html">Rudi Ingia</a>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.local.js"></script>
    <script src="supabase-config.js"></script>
    <script src="phase2.js"></script>
  </body>
</html>
