<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badili Nenosiri | KMK(T) Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="phase2.css" />
  </head>
  <body class="auth-body">
    <main class="state-wrap">
      <section class="state-card">
        <span class="badge">Change Password / Badili Nenosiri</span>
        <h2>Karibu Mkuu wa Mfumo. Tafadhali badilisha nenosiri la awali kwa usalama zaidi.</h2>
        <p class="muted">Hatua hii ni ya lazima kwa first login onboarding.</p>
        <form class="form-grid" id="changePasswordForm">
          <div class="password-wrap">
            <input type="password" id="changeCurrentPassword" name="current_password" placeholder="Nenosiri la sasa" required />
            <button type="button" class="btn secondary tiny" data-toggle-password="changeCurrentPassword">Show</button>
          </div>
          <div class="password-wrap">
            <input type="password" id="changeNewPassword" name="new_password" placeholder="Nenosiri jipya" required />
            <button type="button" class="btn secondary tiny" data-toggle-password="changeNewPassword">Show</button>
          </div>
          <div class="password-wrap">
            <input type="password" id="changeConfirmPassword" name="confirm_password" placeholder="Rudia nenosiri jipya" required />
            <button type="button" class="btn secondary tiny" data-toggle-password="changeConfirmPassword">Show</button>
          </div>
          <p class="security" id="changeStrengthText">Password strength: -</p>
          <button class="btn" type="submit">Save & Continue</button>
          <a href="dashboard.html">Skip kwa sasa</a>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.local.js"></script>
    <script src="supabase-config.js"></script>
    <script src="phase2.js"></script>
  </body>
</html>
