<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="KMK(T) Tanzania Portal">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081428"/>
      <stop offset="55%" stop-color="#0f2850"/>
      <stop offset="100%" stop-color="#143a72"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c547"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <filter id="tshadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="166" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <text
    x="256"
    y="256"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    font-weight="700"
    letter-spacing="-0.02em"
    fill="#fafafa"
    filter="url(#tshadow)"
  >KMK(T)</text>
</svg>
