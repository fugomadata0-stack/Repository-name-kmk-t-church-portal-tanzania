name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "app-next/**"
      - "vercel.json"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app-next/**"
      - "vercel.json"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-next
    env:
      CI: true
      VITE_SUPABASE_URL: https://ci-build-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-build-placeholder-not-secret
      NODE_OPTIONS: --max-old-space-size=6144

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and lint
        run: npm run validate

      - name: Vite production build
        run: npm run build:vite

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e:run
