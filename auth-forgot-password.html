<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Umesahau Nenosiri | KMK(T) Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="phase2.css" />
  </head>
  <body class="auth-body">
    <main class="state-wrap">
      <section class="state-card">
        <span class="badge">Password Recovery</span>
        <h2>Umesahau Nenosiri?</h2>
        <p class="muted">Weka email yako, tutakutumia reset link (mock kwa Phase 2).</p>
        <p class="security" id="forgotStatusAlert">Email verification na reset token flow ipo tayari kuunganishwa Supabase.</p>
        <form class="form-grid" id="forgotForm">
          <input type="email" name="email" placeholder="Email / Barua pepe" required />
          <button class="btn" type="submit">Tuma Reset Link</button>
          <a href="auth-login.html">Rudi kwenye login</a>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.local.js"></script>
    <script src="supabase-config.js"></script>
    <script src="phase2.js"></script>
  </body>
</html>
